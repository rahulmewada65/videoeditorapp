# ------------------------------------------------------------
# 📱 React Native Project-wide Gradle settings
# Optimized for stable APK/AAB release builds
# ------------------------------------------------------------

# 🧠 Increase memory for Gradle to prevent OutOfMemoryError
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# ⚡ Enable Gradle performance optimizations
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.caching=true

# ✅ AndroidX support
android.useAndroidX=true
android.enableJetifier=true

# 🏗️ Supported CPU architectures (for APK splits)
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# 🚀 Enable new React Native architecture (TurboModules & Fabric)
newArchEnabled=true

# ⚙️ Use Hermes JavaScript engine (smaller & faster)
hermesEnabled=true

# --- 🔐 Release Signing Config ---
MYAPP_UPLOAD_STORE_FILE=my-release-key.keystore
MYAPP_UPLOAD_KEY_ALIAS=my-key-alias
MYAPP_UPLOAD_STORE_PASSWORD=rahul@2210
MYAPP_UPLOAD_KEY_PASSWORD=rahul@2210
# --- 🔐 End Release Signing Config ---
